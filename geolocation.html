<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Location Report</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #78cedd;
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
            height: 400px;
        }

        .container {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 16px;
            display: block;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .message {
            margin-top: 20px;
        }

        .message p {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Submit Smart Feedback Notification System</h2>
        <div id="map"></div>

        <form id="report-form">
            <div class="form-group">
                <label for="category">Report Category:</label>
                <input type="text" id="category" placeholder="e.g., Pothole" required />
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" rows="4" placeholder="Describe the issue..." required></textarea>
            </div>
            <input type="hidden" id="lat" />
            <input type="hidden" id="lng" />

            <button type="submit">Submit Report</button>
        </form>

        <div class="message" id="response-message"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map;
        let marker;
        let lat = null;
        let lng = null;

        // Function to show geolocation
        function getGeoLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        lat = position.coords.latitude;
                        lng = position.coords.longitude;
                        showMap(lat, lng);
                        reverseGeocode(lat, lng);
                    },
                    (error) => {
                        alert('Error getting location: ' + error.message);
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        // Function to display map and user location
        function showMap(lat, lng) {
            map = L.map('map').setView([lat, lng], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);
            
            marker = L.marker([lat, lng]).addTo(map)
                .bindPopup('Your location')
                .openPopup();

            map.on('click', function(e) {
                marker.setLatLng(e.latlng);
                lat = e.latlng.lat;
                lng = e.latlng.lng;
                document.getElementById('lat').value = lat;
                document.getElementById('lng').value = lng;
                reverseGeocode(lat, lng);  // Update address when pin is moved
            });

            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;
        }

        // Function to reverse geocode coordinates into an address
        function reverseGeocode(lat, lng) {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                .then(response => response.json())
                .then(data => {
                    const address = data.display_name || 'Address not found';
                    document.getElementById('response-message').innerHTML = `<p>Location: ${address}</p>`;
                })
                .catch(error => {
                    console.error('Error with geocoding:', error);
                });
        }

        // Form submission
        document.getElementById('report-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;

            // Sending report data to the server (simulated here)
            const reportData = {
                category: category,
                description: description,
                lat: lat,
                lng: lng
            };

            // Simulating server response
            setTimeout(() => {
                document.getElementById('response-message').innerHTML = `<p>Report submitted successfully!</p>`;
                console.log('Report Data:', reportData);
            }, 1000);
        });

        // Initialize
        getGeoLocation();
    </script>
</body>
</html>
