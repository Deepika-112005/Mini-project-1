<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Feedback Notification App</title>
  <style>
    /* General Styles */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: #fff;
    }

    header {
      background: rgba(0,0,0,0.3);
      padding: 15px 30px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 1px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 80vh;
      padding: 20px;
    }

    .hero h2 {
      font-size: 2.8rem;
      margin-bottom: 15px;
      animation: fadeInDown 1s ease-in-out;
    }

    .hero p {
      font-size: 1.2rem;
      max-width: 600px;
      margin-bottom: 30px;
      animation: fadeInUp 1.2s ease-in-out;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    button {
      background: #fff;
      color: #2575fc;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
      background: #2575fc;
      color: #fff;
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 15px 0;
      background: rgba(0,0,0,0.3);
      font-size: 0.9rem;
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Smart Feedback Driven Offer Notification System</h1>
  </header>

  <section class="hero">
    <h2>Welcome to Smart Feedback Notification System</h2>
    <p>Delivering personalized offers and real-time feedback notifications to boost engagement and customer satisfaction.</p>
    <div class="button-container">
      <button onclick="window.location.href='login.html'">Login</button>
      <button onclick="window.location.href='register.html'">Register</button>
      <button onclick="window.location.href='geolocation.html'">Geolocation</button>
      <button onclick="window.location.href='feedback.html'">Feedback</button>
      <button onclick="window.location.href='Product.html'">Product</button>
      <button onclick="window.location.href='Discount.html'">Discount</button>
      <button onclick="window.location.href='admin_login.html'">Admin</button>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 Smart Feedback Notification System. All Rights Reserved.</p>
  </footer>
</body>
</html>
