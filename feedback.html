<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback</title>
  <style>
    body {
      background-image: url('app.jpg');
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
    }
    div {
      margin: 20%;
      margin-top: 5%;
      padding: 40px;
      background-color: antiquewhite;
      border-radius: 8px;
    }
    input {
      padding: 10px;
      width: 500px;
      margin-top: 10px;
    }
    button {
      padding: 10px;
      background-color: rgb(73, 73, 224);
      color: white;
      width: 120px;
      margin-top: 10px;
      border: none;
      border-radius: 4px;
    }
    button:hover { cursor: pointer; }
    td { font-family: Arial, Helvetica, sans-serif; font-weight: bolder; padding: 5px; }
  </style>
</head>
<body>
  <h1 style="text-align: center; color: red;">User Feedback Form</h1>
  <div>
    <form action="feedback.php" method="POST">
      <table>
        <tr>
          <td>Name</td>
          <td><input type="text" id="name" name="name" required></td>
        </tr>
        <tr>
          <td>Email</td>
          <td><input type="email" id="email" name="email" required></td>
        </tr>
        <tr>
          <td>Product Preferences</td>
          <td><input type="text" id="preferences" name="preferences" placeholder="e.g., eco_friendly, budget_friendly"></td>
        </tr>
        <tr>
          <td>Shopping Interests</td>
          <td><input type="text" id="interests" name="interests" placeholder="e.g., electronics, fashion"></td>
        </tr>
        <tr>
          <td></td>
          <td><button type="submit">Submit</button></td>
        </tr>
      </table>
    </form>
  </div>
</body>
</html>
